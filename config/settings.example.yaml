# 视频到行动助手配置文件（示例 / 模板）
# 复制本文件为 settings.yaml 并填写真实值

# 自动化级别: observe(仅分析), confirm(每步确认), auto(自动执行)
automation_level: confirm

output_dir: outputs
max_retries: 3

# 下载配置
download:
  primary: douyin-downloader
  fallback: yt-dlp
  format: mp4
  quality: best

# 抖音下载器配置
douyin_downloader:
  project_path: ""
  thread: 3
  retry_times: 3
  proxy: ""
  cookies:
    msToken: ""
    ttwid: ""
    odin_tt: ""
    passport_csrf_token: ""
    sid_guard: ""

# 平台配置
platforms:
  douyin:
    name: 抖音
    greenvideo_url: https://greenvideo.cc/douyin
  bilibili:
    name: B站
    greenvideo_url: https://greenvideo.cc/bilibili
  youtube:
    name: YouTube
    greenvideo_url: https://greenvideo.cc/youtube

# 语音转写配置
transcription:
  model: base
  language: zh

# LLM 配置（从环境变量读取 API Key）
llm:
  provider: openai
  api_key: ${AGNES_API_KEY}
  base_url: https://apihub.agnes-ai.com/v1
  model: agnes-2.0-flash
  max_tokens: 2048
  temperature: 0.3
  timeout: 120

# 安全边界
safety:
  forbidden_keywords:
    - rm -rf /
    - format
    - del /f /s /q
  require_confirm:
    - run_remote_script
    - install_system_software
    - modify_system_env
