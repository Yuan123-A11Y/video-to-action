# GitHub Actions 工作流：代码质量检查
# 每次 push 和 pull_request 时自动运行

name: Code Quality Check

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 缓存依赖
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://mirrors.huaweicloud.com/repository/pypi/simple/
          pip install black isort flake8 mypy pytest pytest-cov pylint -i https://mirrors.huaweicloud.com/repository/pypi/simple/

      - name: 检查代码格式 (Black)
        run: |
          black --check --line-length=120 video_to_action/ tests/

      - name: 检查导入排序 (isort)
        run: |
          isort --check-only --profile=black --line-length=120 video_to_action/ tests/

      - name: 类型检查 (mypy)
        run: |
          mypy video_to_action/ --ignore-missing-imports --strict-optional

      - name: 代码质量检查 (flake8)
        run: |
          flake8 video_to_action/ tests/ --max-line-length=120 --extend-ignore=E203,W503

      - name: 运行测试 (pytest)
        run: |
          pytest tests/ -v --cov=video_to_action --cov-report=term-missing --cov-fail-under=50

      - name: 上传测试覆盖率
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行安全扫描 (Bandit)
        uses: securecodewarrior/github-action-add-sarif@v1
        with:
          tool: bandit
          target: video_to_action/
          args: -ll -r -f json -o bandit-report.json

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-report.json

  code-review-bot:
    name: Automated Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行代码审查 (Danger)
        uses: danger/danger@v1
        with:
          args: --dangerfile=Dangerfile.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查 PR 大小
        uses: mauricioduarte/pr-size-check@v1
        with:
          max_lines: 500
          exclude_files: "*.md,*.txt,*.yaml,*.json"
