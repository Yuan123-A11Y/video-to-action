<svg viewBox="0 0 680 520" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font: 14px sans-serif; fill: #444441; }
      .ts { font: 12px sans-serif; fill: #888780; }
      .th { font: 500 14px sans-serif; fill: #444441; }
      .box { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; rx: 8; }
      .node { cursor: pointer; }
      .arr { stroke: #888780; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- 标题 -->
  <text x="340" y="30" text-anchor="middle" class="th" style="font-size: 16px;">Video-to-Action 系统架构</text>

  <!-- 用户输入层 -->
  <rect x="240" y="50" width="200" height="44" class="box" style="fill: #E6F1FB; stroke: #378ADD;"/>
  <text x="340" y="72" text-anchor="middle" class="th" style="fill: #185FA5;">用户输入</text>
  <text x="340" y="90" text-anchor="middle" class="ts">视频URL + 参数</text>

  <!-- CLI层 -->
  <rect x="240" y="120" width="200" height="56" class="box" style="fill: #EEEDFE; stroke: #7F77DD;"/>
  <text x="340" y="142" text-anchor="middle" class="th" style="fill: #534AB7;">CLI 命令行接口</text>
  <text x="340" y="160" text-anchor="middle" class="ts">cli.py - 参数解析与调度</text>
  <text x="340" y="176" text-anchor="middle" class="ts" style="font-size: 11px;">--level: extract/observe/confirm/auto</text>

  <!-- 核心处理层 -->
  <!-- Downloader -->
  <rect x="40" y="210" width="160" height="56" class="box" style="fill: #E1F5EE; stroke: #1D9E75;"/>
  <text x="120" y="232" text-anchor="middle" class="th" style="fill: #0F6E56;">Downloader</text>
  <text x="120" y="250" text-anchor="middle" class="ts">视频下载器</text>
  <text x="120" y="266" text-anchor="middle" class="ts" style="font-size: 11px;">yt-dlp / B站API</text>

  <!-- Extractor -->
  <rect x="260" y="210" width="160" height="56" class="box" style="fill: #FAECE7; stroke: #D85A30;"/>
  <text x="340" y="232" text-anchor="middle" class="th" style="fill: #993C1D;">Extractor</text>
  <text x="340" y="250" text-anchor="middle" class="ts">内容提取器</text>
  <text x="340" y="266" text-anchor="middle" class="ts" style="font-size: 11px;">音频/转写/关键帧</text>

  <!-- Analyzer -->
  <rect x="480" y="210" width="160" height="56" class="box" style="fill: #FBEAF0; stroke: #D4537E;"/>
  <text x="560" y="232" text-anchor="middle" class="th" style="fill: #993556;">Analyzer</text>
  <text x="560" y="250" text-anchor="middle" class="ts">分析器</text>
  <text x="560" y="266" text-anchor="middle" class="ts" style="font-size: 11px;">LLM内容分析</text>

  <!-- Resolver -->
  <rect x="40" y="300" width="160" height="44" class="box" style="fill: #FAEEDA; stroke: #BA7517;"/>
  <text x="120" y="322" text-anchor="middle" class="th" style="fill: #854F0B;">Resolver</text>
  <text x="120" y="338" text-anchor="middle" class="ts">错误诊断与修复</text>

  <!-- Operator -->
  <rect x="260" y="300" width="160" height="44" class="box" style="fill: #EAF3DE; stroke: #639922;"/>
  <text x="340" y="322" text-anchor="middle" class="th" style="fill: #3B6D11;">Operator</text>
  <text x="340" y="338" text-anchor="middle" class="ts">执行器（待实现）</text>

  <!-- 配置层 -->
  <rect x="480" y="300" width="160" height="44" class="box" style="fill: #FCEBEB; stroke: #E24B4A;"/>
  <text x="560" y="322" text-anchor="middle" class="th" style="fill: #A32D2D;">Config</text>
  <text x="560" y="338" text-anchor="middle" class="ts">settings.yaml</text>

  <!-- 输出层 -->
  <rect x="180" y="380" width="320" height="56" class="box" style="fill: #E6F1FB; stroke: #378ADD;"/>
  <text x="340" y="402" text-anchor="middle" class="th" style="fill: #185FA5;">输出层</text>
  <text x="340" y="420" text-anchor="middle" class="ts">outputs/ - 报告、转录、音频、图片</text>
  <text x="340" y="436" text-anchor="middle" class="ts" style="font-size: 11px;">Markdown报告 + JSON数据 + 音频WAV + 关键帧JPG</text>

  <!-- 工具函数层 -->
  <rect x="40" y="460" width="600" height="36" class="box" style="fill: #F1EFE8; stroke: #B4B2A9;"/>
  <text x="340" y="482" text-anchor="middle" class="ts">tools/ - 工具函数库（文件、网络、文本处理等）</text>

  <!-- 箭头连接 -->
  <!-- 用户输入 → CLI -->
  <path d="M 340 94 L 340 120" class="arr"/>

  <!-- CLI → 核心模块 -->
  <path d="M 280 176 L 120 210" class="arr"/>
  <path d="M 340 176 L 340 210" class="arr"/>
  <path d="M 400 176 L 560 210" class="arr"/>

  <!-- Downloader → Extractor -->
  <path d="M 200 238 L 260 238" class="arr" style="stroke-dasharray: 4 2;"/>

  <!-- Extractor → Analyzer -->
  <path d="M 420 238 L 480 238" class="arr" style="stroke-dasharray: 4 2;"/>

  <!-- 核心模块 → 输出 -->
  <path d="M 120 266 L 240 380" class="arr" style="stroke-dasharray: 4 2;"/>
  <path d="M 340 266 L 340 380" class="arr"/>
  <path d="M 560 266 L 440 380" class="arr" style="stroke-dasharray: 4 2;"/>

  <!-- Resolver反馈 -->
  <path d="M 80 300 L 80 266 L 100 266" class="arr" style="stroke: #BA7517;"/>
  <text x="60" y="284" class="ts" style="fill: #854F0B; font-size: 10px;">错误修复</text>

  <!-- Config配置 -->
  <path d="M 480 266 L 560 300" class="arr" style="stroke-dasharray: 4 2;"/>
  <text x="520" y="280" class="ts" style="font-size: 10px;">配置读取</text>

  <!-- Tools支撑 -->
  <path d="M 120 344 L 120 460" class="arr" style="stroke-dasharray: 2 2; opacity: 0.5;"/>
  <path d="M 340 344 L 340 460" class="arr" style="stroke-dasharray: 2 2; opacity: 0.5;"/>
  <path d="M 560 344 L 560 460" class="arr" style="stroke-dasharray: 2 2; opacity: 0.5;"/>

</svg>