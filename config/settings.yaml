# 视频到行动助手配置文件

# 自动化级别: observe(仅分析), confirm(每步确认), auto(自动执行)
automation_level: auto

# 输出目录
output_dir: outputs

# 最大自动重试次数
max_retries: 3

# 下载配置
download:
  # 主下载方案: yt-dlp
  primary: yt-dlp
  # 备选下载方案: greenvideo
  fallback: greenvideo
  # 视频保存格式
  format: mp4
  # 默认视频质量
  quality: best

# 平台配置
platforms:
  douyin:
    name: 抖音
    greenvideo_url: https://greenvideo.cc/douyin
  bilibili:
    name: B站
    greenvideo_url: https://greenvideo.cc/bilibili
  youtube:
    name: YouTube
    greenvideo_url: https://greenvideo.cc/youtube

# 语音转写配置
transcription:
  model: base
  language: zh

# 安全边界
safety:
  # 禁止执行包含这些关键词的命令
  forbidden_keywords:
    - rm -rf /
    - format
    - del /f /s /q
  # 需要确认的操作
  require_confirm:
    - run_remote_script
    - install_system_software
    - modify_system_env
