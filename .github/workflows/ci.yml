name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov pip-audit safety

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check .

      - name: Format check with Ruff
        run: |
          ruff format --check .

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=video_to_action --cov-report=term-missing --cov-fail-under=40

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Check dependencies for vulnerabilities (pip-audit)
        run: |
          pip-audit --descend-into extras --requirement requirements.txt || true

      - name: Check dependencies for vulnerabilities (safety)
        run: |
          safety check || true

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t video-to-action:latest .

      - name: Test Docker image
        run: |
          docker run --rm video-to-action:latest python -c "import video_to_action; print('OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # 在这里添加你的部署脚本
          # 例如：使用 SSH 部署到服务器，或推送到容器注册表
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
